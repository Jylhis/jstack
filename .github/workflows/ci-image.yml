name: Build CI Image
on:
  # Rebuild weekly (Monday 6am UTC) to pick up CLI updates
  schedule:
    - cron: '0 6 * * 1'
  # Rebuild on devenv config or lockfile changes
  push:
    branches: [main]
    paths:
      - 'devenv.nix'
      - 'devenv.yaml'
      - 'devenv.lock'
  # Manual trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: ubicloud-standard-2
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - uses: cachix/devenv-action@v1

      - name: Build and push CI container
        run: |
          devenv container copy ci \
            --copy-args "--dest-creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
          # Also tag with the commit SHA
          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://ghcr.io/${{ github.repository }}/ci:latest" \
            "docker://ghcr.io/${{ github.repository }}/ci:${{ github.sha }}"
