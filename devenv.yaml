# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
imports:
  - ./modules/claude-skills.nix

inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs

secretspec:
  enable: true
  provider: env #onepassword  # keyring, dotenv, env, 1password, lastpass
  profile: development   # profile from secretspec.toml
# https://devenv.sh/binary-caching/
cachix:
  pull:
    - jylhis
    - devenv
