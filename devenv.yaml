# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
imports:
  - ./modules/claude-skills.nix

inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/4bd9165a9165d7b5e33ae57f3eecbcb28fb231c9
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs

secretspec:
  enable: true
  provider: onepassword  #onepassword  # keyring, dotenv, env, 1password, lastpass
  profile: development   # profile from secretspec.toml
# https://devenv.sh/binary-caching/
cachix:
  pull:
    - jylhis
    - devenv
