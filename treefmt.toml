# https://treefmt.com/
# treefmt is wired into the devenv shell via `pkgs.treefmt` in devenv.nix.
# Run `treefmt` (or `treefmt --fail-on-change` in CI) from the project root.

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]

[formatter.shell]
command = "shfmt"
options = ["-i", "2", "-s", "-w"]
includes = ["*.sh", "*.bash"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = [
  "*.json",
  "*.md",
  "*.mdx",
  "*.yaml",
  "*.yml",
]
excludes = [
  "devenv.lock",
  "npins/sources.json",
  "plugins/**/evals/evals.json",
]
