- description: "ownership skill produces correct shared-state design"
  vars:
    prompt: "Design a Rust struct Cache<K, V> that stores a HashMap and is shared across multiple threads. Support get, insert, and cheap cloning. Write the struct and a function that clones it into two threads where both insert and read values concurrently."
  metadata:
    tags: ["@quality", "@rust-dev"]
  assert:
    - type: llm-rubric
      threshold: 0.67
      value: |
        The response must:
        1. Use Arc<Mutex<HashMap>> or Arc<RwLock<HashMap>> for thread-safe sharing
        2. Clone the Arc, NOT the underlying HashMap
        3. NOT move the HashMap into a thread without Arc wrapping
        4. Explain why Arc is needed instead of Rc (Send + Sync for multi-threading)
        5. Handle lock poisoning or document why it is acceptable to unwrap

- description: "error-handling skill uses thiserror for library-grade errors"
  vars:
    prompt: "Write a Rust function load_config(path: &str) -> Result<AppConfig, ConfigError> that reads a YAML file and deserializes it. AppConfig has: host (required), port (1-65535), tls_enabled (optional, default false), tls_cert (required if tls_enabled). Return clear errors per field. Write a caller that falls back to defaults if file missing, but panics on invalid syntax."
  metadata:
    tags: ["@quality", "@rust-dev"]
  assert:
    - type: llm-rubric
      threshold: 0.67
      value: |
        The response must:
        1. Define a custom ConfigError enum using thiserror (NOT anyhow for library code)
        2. Have distinct error variants for at least: I/O failure, deserialization failure, and validation failure (variant names may differ)
        3. The caller must pattern-match on ConfigError to distinguish file-not-found (fallback) from parse error (panic)
        4. Validation errors must describe which field failed and why
        5. Use ? operator for error propagation, not manual match blocks

- description: "concurrency skill produces correct async patterns"
  vars:
    prompt: "Write a Rust async function that fetches 10 URLs concurrently with a max of 3 simultaneous requests. Collect all results (successes and failures) without short-circuiting. Use tokio."
  metadata:
    tags: ["@quality", "@rust-dev"]
  assert:
    - type: llm-rubric
      threshold: 0.67
      value: |
        The response must:
        1. Use a semaphore (tokio::sync::Semaphore) or buffered stream for concurrency limiting
        2. NOT use join_all without limiting (would fire all 10 at once)
        3. Collect both Ok and Err results (not short-circuit on first error)
        4. Use Arc for sharing the semaphore across tasks
        5. Properly handle the JoinHandle results (flatten the Result<Result<...>>)
