- description: "skill-creator produces rigorous eval design"
  vars:
    prompt: "Design a skill that helps users write Kubernetes manifests with security best practices. Plan: what should this skill enable, when should it trigger, write 3 realistic test prompts, and for each define 4-5 assertions that test response quality. Assertions must be objective and verifiable. Explain how you would detect skill failures."
  metadata:
    tags: ["@quality", "@skill-creator"]
  assert:
    - type: llm-rubric
      threshold: 0.67
      value: |
        The response must:
        1. Test prompts are realistic multi-step scenarios (not trivial single operations)
        2. Assertions are objective and verifiable (no subjective criteria like 'looks good' or 'is professional')
        3. Assertions test skill quality, not just keyword presence (e.g., 'securityContext sets runAsNonRoot: true' not just 'mentions security')
        4. Include both happy-path and edge-case coverage (e.g., user provides a Deployment without resource limits)
        5. Describe a concrete failure detection method (assertion fails -> which skill aspect is broken)

- description: "skill-creator produces correct SKILL.md trigger design"
  vars:
    prompt: "Turn this workflow into a reusable skill: when a user asks about database migrations, help them write safe migration scripts that handle rollbacks, avoid locking tables, and include data validation. Write the SKILL.md trigger section with description that routes correctly."
  metadata:
    tags: ["@quality", "@skill-creator"]
  assert:
    - type: llm-rubric
      threshold: 0.67
      value: |
        The response must:
        1. Include a SKILL.md with proper frontmatter (name, description, at minimum)
        2. Description is specific enough to trigger on migration-related queries but NOT on general SQL questions
        3. Include trigger keywords that match real user phrasing (migration, schema change, ALTER TABLE, rollback)
        4. Body contains actionable guidance (not just a list of concepts)
        5. Guidance covers the three requested topics: rollbacks, locking avoidance, data validation
